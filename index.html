<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoMind AI | Official Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #0d1117;
            color: #ffffff;
            text-align: center;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
        }
        .container { padding: 40px 20px; }
        .logo-icon {
            font-size: 50px;
            color: #58a6ff;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 3rem;
            background: linear-gradient(45deg, #58a6ff, #bc8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0;
        }
        p {
            font-size: 1.2rem;
            color: #8b949e;
            max-width: 600px;
            margin: 0 auto 30px auto;
        }
        .btn-group { margin-bottom: 40px; }
        .btn {
            display: inline-block;
            padding: 15px 35px;
            background-color: #238636;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(35, 134, 54, 0.4);
        }
        .btn:hover {
            transform: translateY(-3px);
            background-color: #2ea043;
        }
        .social-links {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 25px;
        }
        .social-links a {
            color: #8b949e;
            font-size: 1.5rem;
            transition: 0.3s;
            text-decoration: none;
        }
        .social-links a:hover { color: #58a6ff; }
        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #484f58;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-icon"><i class="fas fa-brain"></i></div>
        <h1>CryptoMind AI</h1>
        <p>The next generation of AI-driven blockchain intelligence. Empowering traders with real-time neural insights.</p>
        
        <div class="btn-group">
            <a href="mailto:your-email@example.com" class="btn">Get Early Access</a>
        </div>

        <div class="social-links">
            <a href="https://linkedin.com/in/YOUR_USERNAME" target="_blank" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
            <a href="https://x.com/YOUR_USERNAME" target="_blank" title="X (Twitter)"><i class="fab fa-x-twitter"></i></a>
            <a href="https://t.me/YOUR_USERNAME" target="_blank" title="Telegram"><i class="fab fa-telegram"></i></a>
        </div>

        <div class="footer">
            &copy; 2026 CryptoMind AI. Built for the Future of Finance.
        </div>
    </div>
</body>
</html>
