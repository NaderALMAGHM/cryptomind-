<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoMind AI | The Future of Trading</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d1117;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
        }
        .container {
            padding: 20px;
        }
        .logo {
            font-size: 60px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #58a6ff, #bc8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }
        h1 {
            color: #58a6ff;
            font-size: 3.5rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        p {
            font-size: 1.25rem;
            color: #8b949e;
            max-width: 600px;
            margin: 0 auto 30px auto;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #238636;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(35, 134, 54, 0.3);
        }
        .btn:hover {
            background-color: #2ea043;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 160, 67, 0.4);
        }
        .status {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #58a6ff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">◈ CryptoMind AI ◈</div>
        <h1>Next-Gen Crypto Intelligence</h1>
        <p>Harnessing the power of AI to revolutionize blockchain analysis and trading strategies.</p>
        <a href="#" class="btn">Launch Platform</a>
        <div class="status">System Status: Project Under Development</div>
    </div>
</body>
</html>
